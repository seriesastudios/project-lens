<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Lens</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'SF Pro Display', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
        }

        .card-enter {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar for chat */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gray-800 antialiased flex selection:bg-orange-100 selection:text-orange-900">

    <!-- 60% Left Pane: The Journal / Active Chat -->
    <div class="w-[60%] h-full flex flex-col border-r border-gray-200/60 bg-white shadow-[10px_0_15px_-3px_rgba(0,0,0,0.02)] relative z-10">

        <!-- Header -->
        <div class="px-10 py-8 pb-4">
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">The Journal</h1>
            <p class="text-sm text-gray-400 mt-1 font-medium">Intent-driven capture & triage</p>
        </div>

        <!-- Chat History -->
        <div id="chat-history" class="flex-1 overflow-y-auto px-10 py-6 space-y-6 no-scrollbar pb-32">
            <!-- Initial greeting -->
            <div class="flex flex-col items-start gap-1">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1 ml-1">Lens Brain</span>
                <div class="px-5 py-3.5 bg-gray-50 border border-gray-100 text-gray-700 text-[15px] leading-relaxed rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm">
                    Ready when you are. Tell me what's on your mind.
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent pt-12">
            <form id="chat-form" class="relative group max-w-3xl mx-auto shadow-sm">
                <input
                    type="text"
                    id="chat-input"
                    class="w-full bg-white border border-gray-200 text-gray-800 text-[15px] rounded-2xl focus:ring-4 focus:ring-orange-50 focus:border-orange-200 block p-4 pl-5 pr-14 outline-none transition-all duration-200 placeholder-gray-400 font-medium"
                    placeholder="Capture a thought, task, or goal..."
                    autocomplete="off"
                    required>
                <button type="submit" id="send-btn" class="absolute inset-y-0 right-2 flex items-center justify-center my-auto h-10 w-10 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-xl transition-all duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- 40% Right Pane: The Lens / Focus Stack -->
    <div class="w-[40%] h-full bg-[#FAFAFA] flex flex-col relative z-0">

        <!-- Header -->
        <div class="px-10 py-8 pb-4 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-semibold tracking-tight text-gray-900">The Lens</h2>
                <p class="text-sm text-gray-400 mt-1 font-medium">What matters right now</p>
            </div>
            <div class="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                Sync Active
            </div>
        </div>

        <!-- Node List -->
        <div class="flex-1 px-8 py-6 pt-2 overflow-y-auto no-scrollbar">
            <div id="node-container" class="space-y-3.5 flex flex-col">
                <!-- Cards injected here via WebSocket -->
                <div class="text-center py-20 text-gray-400 text-sm italic">Connecting…</div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');
        const nodeContainer = document.getElementById('node-container');
        const sendBtn = document.getElementById('send-btn');

        // Card wash = EISENHOWER QUADRANT (urgency × importance). Urgency = is it
        // due now — the 'next' band (overdue / ≤2 days); importance = high priority.
        // Sort is still deadline-first; this only encodes the quadrant in color.
        const QUADRANT_TOKENS = {
            do:       'bg-rose-50 text-rose-950 border-rose-300/70 shadow-[0_4px_20px_-4px_rgba(254,205,211,0.6)]', // urgent + important — do now
            urgent:   'bg-orange-50 text-orange-950 border-orange-200/60 shadow-sm',  // urgent, not important
            schedule: 'bg-indigo-50/70 text-indigo-950 border-indigo-200/50',         // important, not urgent — schedule
            later:    'bg-slate-50 text-slate-600 border-slate-200/70',               // neither — later
        };

        // A card's quadrant from the two axes it already carries.
        const quadrantToken = (node) => {
            const urgent = node.category === 'next';      // overdue or due within ~2 days
            const important = node.priority === 'high';
            if (urgent && important) return QUADRANT_TOKENS.do;
            if (urgent)              return QUADRANT_TOKENS.urgent;
            if (important)           return QUADRANT_TOKENS.schedule;
            return QUADRANT_TOKENS.later;
        };

        const formatDeadline = (value) => {
            // Bare dates must parse as LOCAL midnight — new Date('YYYY-MM-DD')
            // is UTC and shifts the day back in western timezones.
            const date = new Date(/^\d{4}-\d{2}-\d{2}$/.test(value) ? value + 'T00:00:00' : value);
            if (isNaN(date)) return value;
            return date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        };

        // Importance now lives in the quadrant wash, so the stripe only marks
        // LOW priority (deprioritized work) with a faded gray edge.
        const priorityClasses = (node) =>
            node.priority === 'low' ? 'border-l-4 border-l-gray-300 opacity-75' : '';

        // Deterministic click navigation — the server broadcasts the new view.
        const setView = (body) =>
            fetch('/api/view', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            }).catch(console.error);

        // The view currently on screen — lets cards build the right drill path.
        let currentView = null;

        // The breadcrumb path to land on when entering a container card.
        const enterPath = (node) => {
            if (currentView && currentView.mode === 'node')
                return [...currentView.breadcrumb.map((b) => b.id), node.id];
            if (node.node_type === 'project') return [node.id];
            if (node.project_id) return [node.project_id, node.id];   // task under a project
            return [node.id];
        };

        const enterNode = (node) => {
            if (node.pseudo === 'loose') return setView({ mode: 'loose' });
            return setView({ mode: 'node', path: enterPath(node) });
        };

        const buildCard = (node, index, chipName, clickable) => {
            const colorClass = quadrantToken(node);
            const el = document.createElement('div');
            el.className = `card-enter border rounded-[1.25rem] p-5 transition-all duration-300 hover:scale-[1.01] hover:shadow-md ${colorClass} ${priorityClasses(node)}`;
            el.style.animationDelay = `${index * 0.05}s`;

            const row = document.createElement('div');
            row.className = 'flex items-start justify-between gap-4';

            const body = document.createElement('div');
            body.className = 'flex-1';

            const isProject = node.node_type === 'project';

            if (isProject) {
                // Projects must not look like tasks: badge instead of chip,
                // and no complete button (closing a project happens in chat).
                const badge = document.createElement('p');
                badge.className = 'text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1.5 flex items-center gap-1';
                badge.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>';
                const badgeText = document.createTextNode(
                    (node.pseudo === 'loose' ? 'No project' : 'Project')
                    + (node.project_open_total ? ` · ${node.project_open_total} open` : ''));
                badge.appendChild(badgeText);
                body.appendChild(badge);
            } else if (chipName) {
                const chip = document.createElement('p');
                chip.className = 'text-[10px] font-semibold uppercase tracking-widest opacity-50 mb-1.5';
                // When the chip names a real project, it doubles as the way in —
                // same affordance the old section header carried.
                if (node.project_id) {
                    chip.className += ' cursor-pointer hover:opacity-100 hover:text-orange-500 transition-colors';
                    chip.textContent = `${chipName} ▸`;
                    chip.title = `Open ${chipName}`;
                    chip.addEventListener('click', (e) => {
                        e.stopPropagation();
                        setView({ mode: 'node', path: [node.project_id] });
                    });
                } else {
                    chip.textContent = chipName;
                }
                body.appendChild(chip);
            }

            const title = document.createElement('p');
            title.className = isProject
                ? 'text-[15px] font-semibold leading-snug tracking-tight'
                : 'text-[15px] font-medium leading-snug tracking-tight';
            if (node.done) {
                el.classList.add('opacity-60');
                const check = document.createElement('span');
                check.className = 'text-green-600 mr-1.5';
                check.textContent = '✓';
                title.appendChild(check);
                title.classList.add('line-through', 'decoration-current/40');
            }
            title.appendChild(document.createTextNode(node.content));
            body.appendChild(title);

            if (node.target_date) {
                const due = document.createElement('p');
                due.className = 'text-xs opacity-70 mt-2 font-medium flex items-center gap-1';
                due.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>';
                due.appendChild(document.createTextNode(formatDeadline(node.target_date)));
                body.appendChild(due);
            }

            row.appendChild(body);
            if (!isProject && !node.done) {
                const actions = document.createElement('div');
                actions.className = 'flex-shrink-0';
                const doneBtn = document.createElement('button');
                doneBtn.className = 'h-6 w-6 rounded-full border border-current opacity-30 hover:opacity-100 hover:bg-black/5 transition-all flex items-center justify-center';
                doneBtn.title = 'Mark complete';
                doneBtn.innerHTML = '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
                doneBtn.addEventListener('click', (e) => { e.stopPropagation(); completeNode(node.id); });
                actions.appendChild(doneBtn);
                row.appendChild(actions);
            }
            el.appendChild(row);

            // Click behavior, in precedence order:
            //  • container (a project, or any task with subtasks) → navigate in
            //  • leaf with a description → expand the note inline (the beloved
            //    expand/contract); click again to collapse
            //  • plain leaf → nothing
            const isContainer = isProject || (node.child_count > 0);
            if (node.done) {
                // Completed cards are a read-only review — no enter, no expand.
            } else if (isContainer) {
                el.classList.add('cursor-pointer');
                if (!isProject) {
                    // Task containers get an "· N ▸" enter cue (projects have their badge).
                    const enter = document.createElement('span');
                    enter.className = 'text-current opacity-40 ml-1.5 text-xs align-middle';
                    enter.textContent = `· ${node.child_count} ▸`;
                    title.appendChild(enter);
                }
                el.addEventListener('click', () => enterNode(node));
            } else if (!isProject && node.description) {
                el.classList.add('cursor-pointer');
                const caret = document.createElement('span');
                caret.className = 'text-current opacity-40 ml-1.5 text-xs align-middle';
                caret.textContent = '▾';
                title.appendChild(caret);

                const desc = document.createElement('p');
                desc.className = 'hidden text-[13px] leading-relaxed opacity-80 mt-3 pt-3 border-t border-current/10 whitespace-pre-wrap';
                desc.textContent = node.description;
                el.appendChild(desc);

                el.addEventListener('click', () => {
                    const open = desc.classList.toggle('hidden') === false;
                    caret.textContent = open ? '▴' : '▾';
                });
            }
            return el;
        };

        // Render Cards (all text injected via textContent — never raw HTML)
        const renderNodes = (nodes, view) => {
            nodeContainer.innerHTML = '';
            currentView = view || { mode: 'today' };
            const mode = view ? view.mode : 'today';

            // Breadcrumb: where you are and every way back up. Views are sticky —
            // they only change when you navigate (by chat or click).
            if (view && view.back) {
                const bar = document.createElement('div');
                bar.className = 'flex items-center flex-wrap gap-x-1.5 gap-y-1 px-3 py-2.5 mb-1 bg-orange-50/80 border border-orange-200/60 rounded-xl text-sm text-orange-900 card-enter';

                const crumb = (text, onClick, isCurrent) => {
                    if (isCurrent) {
                        const span = document.createElement('span');
                        span.className = 'font-semibold';
                        span.textContent = text;
                        return span;
                    }
                    const b = document.createElement('button');
                    b.className = 'text-orange-500 hover:text-orange-800 font-medium transition-colors';
                    b.textContent = text;
                    b.addEventListener('click', onClick);
                    return b;
                };
                const sep = () => {
                    const s = document.createElement('span');
                    s.className = 'text-orange-300';
                    s.textContent = '▸';
                    return s;
                };

                // Root crumb always returns to Today.
                bar.appendChild(crumb('Today', () => setView({ mode: 'today' }), false));
                const trail = (view.breadcrumb && view.breadcrumb.length) ? view.breadcrumb : null;
                if (trail) {
                    trail.forEach((node, i) => {
                        bar.appendChild(sep());
                        const isCurrent = i === trail.length - 1;
                        bar.appendChild(crumb(node.label,
                            () => setView({ mode: 'node', path: trail.slice(0, i + 1).map(n => n.id) }),
                            isCurrent));
                    });
                } else {
                    // Non-node back views (projects / loose / list): one level under Today.
                    bar.appendChild(sep());
                    bar.appendChild(crumb(view.label, null, true));
                }
                const count = document.createElement('span');
                count.className = 'text-orange-300 ml-1';
                count.textContent = `· ${view.count} open`;
                bar.appendChild(count);
                nodeContainer.appendChild(bar);
            }

            if (!nodes || nodes.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'text-center py-20 text-gray-400 text-sm italic font-medium';
                empty.textContent = mode === 'today' ? 'The Lens is clear.' : 'Nothing open here.';
                nodeContainer.appendChild(empty);
                return;
            }

            // Projects overview: every card is a door — click to enter.
            if (mode === 'projects') {
                nodes.forEach((node, index) => {
                    nodeContainer.appendChild(buildCard(node, index, null, true));
                });
                return;
            }

            // Inside a project / list / loose view: a flat, urgency-sorted
            // list. The breadcrumb names the container, so no chips needed.
            if (mode !== 'today') {
                nodes.forEach((node, index) => {
                    nodeContainer.appendChild(buildCard(node, index, null, false));
                });
                return;
            }

            // Today: render in the order the engine ranked them — deadline-led
            // urgency, with priority/blocker nudges. No project clustering: each
            // card carries its project as a clickable chip, so the list stays in
            // true urgency order instead of being reshuffled to group projects.
            nodes.forEach((node, index) => {
                nodeContainer.appendChild(buildCard(node, index, node.project_name,
                                                    node.node_type === 'project'));
            });
        };

        // Direct, deterministic completion — no LLM round-trip for a button click.
        // The server broadcasts the new lens state over the WebSocket.
        const completeNode = async (id) => {
            try {
                const response = await fetch(`/api/nodes/${id}/complete`, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
            } catch (err) {
                appendMessage('**Error:** could not complete the task. Is the backend running?', false);
                console.error(err);
            }
        };

        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        // Escape first, then apply **bold** only — never raw HTML from the model.
        const renderRich = (el, text) => {
            el.innerHTML = escapeHtml(text).replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>');
        };

        const scrollChat = () => { chatHistory.scrollTop = chatHistory.scrollHeight; };

        // Append message to chat
        const appendMessage = (text, isUser = false) => {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} gap-1 card-enter`;

            const sender = document.createElement('span');
            sender.className = `text-xs font-semibold uppercase tracking-widest mb-1 ${isUser ? 'mr-2 text-orange-400' : 'ml-2 text-gray-400'}`;
            sender.innerText = isUser ? 'You' : 'Lens Brain';

            const bubble = document.createElement('div');
            if (isUser) {
                bubble.className = 'px-5 py-3.5 bg-gray-900 text-white text-[15px] leading-relaxed rounded-2xl rounded-tr-sm max-w-[85%] shadow-md font-medium';
            } else {
                bubble.className = 'px-5 py-3.5 bg-gray-50 border border-gray-100 text-gray-700 text-[15px] leading-relaxed rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm';
            }
            renderRich(bubble, text);

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            chatHistory.appendChild(wrapper);
            scrollChat();
            return bubble;
        };

        // A live assistant bubble that streaming events write into:
        // [status placeholder] [confirmed actions] [streamed tokens]
        const appendLiveBubble = () => {
            const bubble = appendMessage('', false);
            const statusEl = document.createElement('span');
            statusEl.className = 'italic text-gray-400';
            const actionsEl = document.createElement('span');
            const streamEl = document.createElement('span');
            bubble.replaceChildren(statusEl, actionsEl, streamEl);
            return { bubble, statusEl, actionsEl, streamEl };
        };

        // Send chat message: POST /api/chat streams NDJSON events; the bubble
        // fills in progressively (status → actions/tokens → final reply).
        const sendChatMessage = async (message) => {
            appendMessage(message, true);

            chatInput.disabled = true;
            sendBtn.innerHTML = `<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            const live = appendLiveBubble();
            const handleEvent = (event) => {
                if (event.type === 'status') {
                    live.statusEl.textContent = event.text;
                } else if (event.type === 'action') {
                    live.statusEl.textContent = '';
                    const piece = document.createElement('span');
                    renderRich(piece, (live.actionsEl.childNodes.length ? ' ' : '') + event.text);
                    live.actionsEl.appendChild(piece);
                } else if (event.type === 'token') {
                    live.statusEl.textContent = '';
                    live.streamEl.textContent += event.text;
                } else if (event.type === 'replace') {
                    live.streamEl.textContent = event.text;
                } else if (event.type === 'done') {
                    renderRich(live.bubble, event.reply);  // authoritative final text
                }
                scrollChat();
            };

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                if (!response.ok || !response.body) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    let newline;
                    while ((newline = buffer.indexOf('\n')) >= 0) {
                        const line = buffer.slice(0, newline).trim();
                        buffer = buffer.slice(newline + 1);
                        if (line) handleEvent(JSON.parse(line));
                    }
                }
            } catch (err) {
                renderRich(live.bubble, '**Error:** Connection to backend failed. Ensure `uvicorn app.main:app` is running.');
                console.error(err);
            } finally {
                chatInput.disabled = false;
                sendBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>`;
                chatInput.focus();
            }
        };

        // Form Submit
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            chatInput.value = '';
            sendChatMessage(message);
        });

        // WebSocket Connection
        let ws;
        const connectWebSocket = () => {
            ws = new WebSocket('ws://' + window.location.host + '/ws');

            ws.onopen = () => console.log('WS Connected');

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.type === 'STATE_UPDATE') {
                        renderNodes(payload.data, payload.view);
                    }
                } catch (e) {
                    console.error("Invalid WS payload", e);
                }
            };

            ws.onclose = () => {
                console.log('WS Disconnected. Reconnecting in 3s...');
                setTimeout(connectWebSocket, 3000);
            };
        };

        connectWebSocket();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Lens</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'SF Pro Display', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
        }
        
        .card-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom scrollbar for chat */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gray-800 antialiased flex selection:bg-orange-100 selection:text-orange-900">

    <!-- 60% Left Pane: The Journal / Active Chat -->
    <div class="w-[60%] h-full flex flex-col border-r border-gray-200/60 bg-white shadow-[10px_0_15px_-3px_rgba(0,0,0,0.02)] relative z-10">
        
        <!-- Header -->
        <div class="px-10 py-8 pb-4">
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">The Journal</h1>
            <p class="text-sm text-gray-400 mt-1 font-medium">Intent-driven capture & triage</p>
        </div>

        <!-- Chat History -->
        <div id="chat-history" class="flex-1 overflow-y-auto px-10 py-6 space-y-6 no-scrollbar pb-32">
            <!-- Initial greeting -->
            <div class="flex flex-col items-start gap-1">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1 ml-1">Lens Brain</span>
                <div class="px-5 py-3.5 bg-gray-50 border border-gray-100 text-gray-700 text-[15px] leading-relaxed rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm">
                    System initialized. I'm ready to capture your intent and update the graph.
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent pt-12">
            <form id="chat-form" class="relative group max-w-3xl mx-auto shadow-sm">
                <input 
                    type="text" 
                    id="chat-input"
                    class="w-full bg-white border border-gray-200 text-gray-800 text-[15px] rounded-2xl focus:ring-4 focus:ring-orange-50 focus:border-orange-200 block p-4 pl-5 pr-14 outline-none transition-all duration-200 placeholder-gray-400 font-medium" 
                    placeholder="Capture a thought, task, or goal..." 
                    autocomplete="off"
                    required>
                <button type="submit" id="send-btn" class="absolute inset-y-0 right-2 flex items-center justify-center my-auto h-10 w-10 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-xl transition-all duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- 40% Right Pane: The Lens / Focus Stack -->
    <div class="w-[40%] h-full bg-[#FAFAFA] flex flex-col relative z-0">
        
        <!-- Header -->
        <div class="px-10 py-8 pb-4 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-semibold tracking-tight text-gray-900">The Lens</h2>
                <p class="text-sm text-gray-400 mt-1 font-medium">Focus stack (max 7)</p>
            </div>
            <div class="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                Sync Active
            </div>
        </div>

        <!-- Node List -->
        <div class="flex-1 px-8 py-6 pt-2 overflow-y-auto no-scrollbar">
            <div id="node-container" class="space-y-3.5 flex flex-col">
                <!-- Cards injected here via WebSocket -->
                <div class="text-center py-20 text-gray-400 text-sm italic">Waiting for state hydration...</div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');
        const nodeContainer = document.getElementById('node-container');
        const sendBtn = document.getElementById('send-btn');

        // Color Mapping based on index/priority
        const getColorTokens = (index) => {
            if (index === 0) {
                // Immediate Core Focus
                return 'bg-orange-50 text-orange-950 border-orange-200/60 shadow-[0_4px_20px_-4px_rgba(255,237,213,0.5)]';
            } else if (index === 1 || index === 2) {
                // Up Next Sequential
                return 'bg-amber-50/70 text-amber-950 border-amber-200/40 shadow-sm';
            } else if (index >= 3 && index <= 4) {
                // On Horizon Baseline
                return 'bg-emerald-50/60 text-emerald-950 border-emerald-200/30';
            } else {
                // Administrative Low Energy
                return 'bg-indigo-50/50 text-indigo-950 border-indigo-200/30 opacity-90';
            }
        };

        // Render Cards
        const renderNodes = (nodes) => {
            nodeContainer.innerHTML = '';
            
            if (!nodes || nodes.length === 0) {
                nodeContainer.innerHTML = '<div class="text-center py-20 text-gray-400 text-sm italic font-medium">The Lens is completely clear.</div>';
                return;
            }

            nodes.forEach((node, index) => {
                const colorClass = getColorTokens(index);
                const el = document.createElement('div');
                el.className = `card-enter border rounded-[1.25rem] p-5 transition-all duration-300 hover:scale-[1.01] hover:shadow-md ${colorClass}`;
                el.style.animationDelay = `${index * 0.05}s`;
                
                el.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1">
                            <p class="text-[15px] font-medium leading-snug tracking-tight">${node.content}</p>
                            ${node.target_date ? `<p class="text-xs opacity-70 mt-2 font-medium flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>${node.target_date}</p>` : ''}
                        </div>
                        <div class="flex-shrink-0">
                            <button class="h-6 w-6 rounded-full border border-current opacity-30 hover:opacity-100 hover:bg-black/5 transition-all flex items-center justify-center" onclick="completeNode(${node.id})">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                nodeContainer.appendChild(el);
            });
        };

        // Complete Node helper (fires a chat implicitly)
        window.completeNode = (id) => {
            sendChatMessage(`I have completed task ID ${id}. Please mark it as completed.`);
        };

        // Append message to chat
        const appendMessage = (text, isUser = false) => {
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isUser ? 'items-end' : 'items-start'} gap-1 card-enter`;
            
            const sender = document.createElement('span');
            sender.className = `text-xs font-semibold uppercase tracking-widest mb-1 ${isUser ? 'mr-2 text-orange-400' : 'ml-2 text-gray-400'}`;
            sender.innerText = isUser ? 'You' : 'Lens Brain';
            
            const bubble = document.createElement('div');
            // Parse markdown bold **text** to <strong>text</strong>
            const parsedText = text.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>');
            
            if (isUser) {
                bubble.className = 'px-5 py-3.5 bg-gray-900 text-white text-[15px] leading-relaxed rounded-2xl rounded-tr-sm max-w-[85%] shadow-md font-medium';
            } else {
                bubble.className = 'px-5 py-3.5 bg-gray-50 border border-gray-100 text-gray-700 text-[15px] leading-relaxed rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm';
            }
            bubble.innerHTML = parsedText;
            
            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            chatHistory.appendChild(wrapper);
            
            // Scroll to bottom
            chatHistory.scrollTop = chatHistory.scrollHeight;
        };

        // Send Chat Message via REST API
        const sendChatMessage = async (message) => {
            appendMessage(message, true);
            
            chatInput.disabled = true;
            sendBtn.innerHTML = `<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                appendMessage(data.reply, false);
            } catch (err) {
                appendMessage('**Error:** Connection to backend failed. Ensure `uvicorn app.main:app` is running.', false);
                console.error(err);
            } finally {
                chatInput.disabled = false;
                sendBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>`;
                chatInput.focus();
            }
        };

        // Form Submit
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            
            chatInput.value = '';
            sendChatMessage(message);
        });

        // WebSocket Connection
        let ws;
        const connectWebSocket = () => {
            ws = new WebSocket('ws://' + window.location.host + '/ws');
            
            ws.onopen = () => console.log('WS Connected');
            
            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    if (payload.type === 'STATE_UPDATE') {
                        renderNodes(payload.data);
                    }
                } catch (e) {
                    console.error("Invalid WS payload", e);
                }
            };

            ws.onclose = () => {
                console.log('WS Disconnected. Reconnecting in 3s...');
                setTimeout(connectWebSocket, 3000);
            };
        };

        connectWebSocket();

    </script>
</body>
</html>
